[pytest]
# Each ROS 2 package under src/ carries its own tests/__init__.py. Under the
# default "prepend" import mode pytest derives the module name from the path
# relative to the first parent without an __init__.py, which collides across
# packages (every package would import a module literally named
# tests.test_*). importlib mode imports each test file under a unique,
# path-derived name, so the bare command `pytest src -q` collects all
# packages without name clashes. Each package conftest.py injects its own
# package root (and phm_core) onto sys.path.
addopts = --import-mode=importlib
