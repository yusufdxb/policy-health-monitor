name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  phm_core:
    name: ruff + pytest (phm_core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.4 pytest ruff
      - name: Ruff lint
        run: ruff check src/phm_core
      - name: Pytest
        run: python -m pytest src/phm_core -q

  colcon:
    name: colcon build (ros:humble)
    runs-on: ubuntu-latest
    container:
      image: ros:humble
    steps:
      - uses: actions/checkout@v5
      - name: Build phm_msgs and phm_core
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --packages-select phm_msgs phm_core
      - name: Run package tests
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test --packages-select phm_msgs phm_core
          colcon test-result --verbose
